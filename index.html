<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Roll Calculator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body {
            /* Premium dark ambient background */
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            color: #f8fafc;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        
        /* Smooth Glassmorphism */
        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        /* Clean Input Fields */
        .premium-input {
            background: rgba(2, 6, 23, 0.5);
            border: 1px solid rgba(51, 65, 85, 0.5);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-input:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: #3b82f6;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3), 0 0 15px rgba(59, 130, 246, 0.3);
            outline: none;
        }
        
        /* Number arrows chupane ke liye */
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* --- GLOW EFFECT --- */
        .glow-box {
            position: relative;
            background: linear-gradient(180deg, rgba(30, 58, 138, 0.3) 0%, rgba(2, 6, 23, 0.8) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-top: 1px solid rgba(96, 165, 250, 0.6);
            animation: box-pulse 2s infinite alternate ease-in-out;
        }
        
        .glow-text {
            text-shadow: 0 0 15px rgba(96, 165, 250, 0.6), 0 0 30px rgba(59, 130, 246, 0.4);
        }

        @keyframes box-pulse {
            0% { box-shadow: 0 0 15px rgba(59, 130, 246, 0.1), inset 0 0 20px rgba(59, 130, 246, 0.05); }
            100% { box-shadow: 0 0 30px rgba(59, 130, 246, 0.4), inset 0 0 30px rgba(59, 130, 246, 0.2); border-color: rgba(96, 165, 250, 0.8); }
        }

        /* Beautiful Button */
        .btn-glow {
            background: linear-gradient(135deg, #2563eb 0%, #4338ca 100%);
            box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.5);
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .btn-glow:hover {
            box-shadow: 0 15px 25px -5px rgba(37, 99, 235, 0.7), 0 0 20px rgba(59, 130, 246, 0.5);
            transform: translateY(-2px);
        }
        .btn-glow:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-3 sm:p-6 md:p-8">

    <div class="glass-panel w-full max-w-md md:max-w-lg rounded-3xl sm:rounded-[2.5rem] p-5 sm:p-8 md:p-10 relative overflow-hidden">
        
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-32 bg-blue-500/10 blur-[50px] rounded-full pointer-events-none"></div>

        <!-- Header -->
        <div class="flex flex-col sm:flex-row items-center sm:items-start justify-center gap-3 sm:gap-4 mb-6 sm:mb-10 relative z-10">
            <div class="flex items-center justify-center w-14 h-14 sm:w-16 sm:h-16 rounded-2xl sm:rounded-[1rem] bg-gradient-to-br from-[#4ade80] to-[#2563eb] shadow-[0_4px_20px_rgba(37,99,235,0.4)] shrink-0 border border-white/20">
                <i class="fas fa-money-bill-wave text-white text-2xl sm:text-3xl drop-shadow-md"></i>
            </div>
            <div class="flex flex-col items-center sm:items-start text-center sm:text-left">
                <div class="flex flex-wrap justify-center sm:justify-start items-center gap-1.5 sm:gap-2 text-[1.35rem] leading-tight sm:text-3xl md:text-4xl font-black uppercase tracking-wide">
                    <span class="bg-gradient-to-b from-[#4ade80] to-[#16a34a] bg-clip-text text-transparent drop-shadow-sm">CURRENCY</span>
                    <span class="bg-gradient-to-b from-[#60a5fa] to-[#1d4ed8] bg-clip-text text-transparent drop-shadow-sm">INCREMENTAL</span>
                </div>
                <div class="text-[9px] sm:text-xs text-slate-400 font-bold uppercase tracking-[0.2em] sm:tracking-[0.25em] mt-1 w-full">
                    JOB ROLL CALCULATOR
                </div>
            </div>
        </div>

        <!-- Inputs -->
        <div class="space-y-4 sm:space-y-5 relative z-10">
            <div>
                <label class="block text-[9px] sm:text-[10px] font-black text-slate-400 mb-1 sm:mb-1.5 uppercase tracking-widest ml-1">Target Odds (1 in X)</label>
                <input type="text" id="targetOdds" class="premium-input w-full px-4 py-3.5 sm:px-5 sm:py-4 rounded-xl sm:rounded-2xl text-white font-mono uppercase text-base sm:text-lg">
            </div>

            <div class="grid grid-cols-2 gap-3 sm:gap-4">
                <div>
                    <label class="block text-[9px] sm:text-[10px] font-black text-slate-400 mb-1 sm:mb-1.5 uppercase tracking-widest ml-1">Speed (Sec)</label>
                    <input type="number" id="rollSpeed" value="1" step="0.01" class="premium-input w-full px-4 py-3.5 sm:px-5 sm:py-4 rounded-xl sm:rounded-2xl text-white font-mono text-base sm:text-lg">
                </div>
                <div>
                    <label class="block text-[9px] sm:text-[10px] font-black text-slate-400 mb-1 sm:mb-1.5 uppercase tracking-widest ml-1">Bulk Rolls</label>
                    <input type="number" id="bulkRolls" class="premium-input w-full px-4 py-3.5 sm:px-5 sm:py-4 rounded-xl sm:rounded-2xl text-white font-mono text-base sm:text-lg">
                </div>
            </div>

            <div>
                <label class="block text-[9px] sm:text-[10px] font-black text-slate-400 mb-1 sm:mb-1.5 uppercase tracking-widest ml-1">Luck Multiplier</label>
                <input type="number" id="luckMulti" step="0.01" class="premium-input w-full px-4 py-3.5 sm:px-5 sm:py-4 rounded-xl sm:rounded-2xl text-white font-mono text-base sm:text-lg">
            </div>

            <div>
                <label class="block text-[9px] sm:text-[10px] font-black text-blue-400 mb-1 sm:mb-1.5 uppercase tracking-widest ml-1 drop-shadow-sm">Custom ETA % (1-99)</label>
                <div class="relative">
                    <input type="text" inputmode="decimal" id="customEta" class="premium-input w-full pl-4 sm:pl-5 pr-8 sm:pr-10 py-3.5 sm:py-4 rounded-xl sm:rounded-2xl text-white font-black text-base sm:text-lg border-blue-900/50 placeholder-slate-500" placeholder="Base (~63.2%)">
                    <div class="absolute inset-y-0 right-0 pr-4 sm:pr-5 flex items-center pointer-events-none">
                        <span class="text-blue-500 font-black text-base sm:text-lg">%</span>
                    </div>
                </div>
            </div>

            <button onclick="calculate()" class="btn-glow w-full py-4 sm:py-5 text-white font-black rounded-xl sm:rounded-2xl uppercase tracking-widest sm:tracking-[0.2em] text-xs sm:text-sm mt-2 sm:mt-4 transition-all duration-300">
                Analyze Roll Time
            </button>
        </div>

        <!-- Result Display -->
        <div id="results" class="hidden mt-8 sm:mt-10 space-y-4 sm:space-y-6 relative z-10 transition-all duration-500 opacity-0 transform translate-y-4">
            
            <div class="glow-box p-6 sm:p-8 rounded-3xl sm:rounded-[2rem] text-center">
                <span class="text-[9px] sm:text-[10px] text-blue-300 font-black uppercase tracking-widest sm:tracking-[0.3em] mb-2 sm:mb-3 block drop-shadow-md">Estimated Duration</span>
                <div id="fullTime" class="text-xl sm:text-3xl font-black text-white leading-tight glow-text tracking-tight"></div>
                <div id="etaSubtext" class="text-[10px] sm:text-xs text-blue-200 mt-2 sm:mt-3 font-semibold tracking-wide opacity-80"></div>
            </div>

            <div class="bg-slate-900/60 rounded-3xl sm:rounded-[2rem] p-5 sm:p-6 border border-slate-800 shadow-inner">
                <h4 class="text-[9px] sm:text-[10px] font-black text-slate-500 uppercase tracking-widest sm:tracking-[0.2em] mb-3 sm:mb-4 text-center">Probability Confidence</h4>
                <div class="space-y-3 sm:space-y-4">
                    <div class="flex justify-between items-center border-b border-slate-800/50 pb-2 sm:pb-3">
                        <span class="text-[10px] sm:text-xs text-slate-400 font-semibold">50% Chance</span>
                        <span id="t50" class="text-[10px] sm:text-xs font-mono text-blue-400 font-bold drop-shadow-sm"></span>
                    </div>
                    <div class="flex justify-between items-center border-b border-slate-800/50 pb-2 sm:pb-3">
                        <span class="text-[10px] sm:text-xs text-slate-400 font-semibold">90% Chance</span>
                        <span id="t90" class="text-[10px] sm:text-xs font-mono text-emerald-400 font-bold drop-shadow-sm"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] sm:text-xs text-slate-400 font-semibold">99% Chance</span>
                        <span id="t99" class="text-[10px] sm:text-xs font-mono text-indigo-400 font-bold drop-shadow-sm"></span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900/40 rounded-xl sm:rounded-2xl p-3 sm:p-4 border border-slate-800/50 flex flex-col sm:flex-row justify-center items-center gap-2 sm:gap-6 text-[9px] sm:text-[10px] text-slate-400 font-bold uppercase tracking-wider">
                <div class="flex items-center gap-1.5">
                    <i class="fas fa-bolt text-yellow-500"></i>
                    <span>Speed: <span id="effSpeed" class="text-slate-200"></span> /Sec</span>
                </div>
                <div class="hidden sm:block w-1 h-1 rounded-full bg-slate-700"></div>
                <div class="flex items-center gap-1.5">
                    <i class="fas fa-dice text-purple-400"></i>
                    <span>Rolls: <span id="totalRolls" class="text-slate-200"></span></span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Number parsing: space aur commas hatane ka logic (Bug fix)
        function parseVal(v) {
            if (!v) return NaN;
            let val = v.trim().toLowerCase().replace(/[\s,]/g, ''); 
            const s = {
                'tg': 1e93, 'node': 1e60, 'tde': 1e42, 'dde': 1e39, 'ude': 1e36,
                'de': 1e33, 'no': 1e30, 'oc': 1e27, 'sp': 1e24, 'sx': 1e21,
                'qn': 1e18, 'qd': 1e15, 'qa': 1e15, 't': 1e12, 'b': 1e9,
                'm': 1e6, 'k': 1e3
            };
            for (let k of Object.keys(s).sort((a,b) => b.length - a.length)) {
                if (val.endsWith(k)) return parseFloat(val.slice(0, -k.length)) * s[k];
            }
            return parseFloat(val);
        }

        // Time format karne ka function
        function formatTime(s) {
            if (s === Infinity || isNaN(s)) return "N/A";
            if (s > 1e15) return "Millions of Years";
            
            const units = [
                { l: 'y', s: 31536000 },
                { l: 'd', s: 86400 },
                { l: 'h', s: 3600 },
                { l: 'm', s: 60 },
                { l: 's', s: 1 }
            ];

            let res = [];
            let rem = s;

            for (let u of units) {
                let val = Math.floor(rem / u.s);
                if (val > 0) {
                    let color = u.l === 'y' || u.l === 'd' ? 'text-white' : u.l === 'h' ? 'text-blue-300' : u.l === 'm' ? 'text-emerald-300' : 'text-slate-300';
                    res.push(`<span class="${color} font-black drop-shadow-sm">${val.toLocaleString()}</span>${u.l}`);
                    rem %= u.s;
                }
            }
            
            return res.length === 0 ? "Instantly" : res.join(" ");
        }

        // Main Calculation Function
        function calculate() {
            const odds = parseVal(document.getElementById('targetOdds').value);
            const speed = parseFloat(document.getElementById('rollSpeed').value);
            const bulk = parseFloat(document.getElementById('bulkRolls').value);
            const luck = parseFloat(document.getElementById('luckMulti').value);
            const customEtaInput = document.getElementById('customEta').value;

            if (isNaN(odds) || isNaN(speed) || isNaN(bulk) || isNaN(luck) || speed <= 0) {
                alert("Please fill all boxes correctly!");
                return;
            }

            const effRPS = (bulk / speed) * luck;
            const baseAvgS = odds / effRPS;
            
            let finalTargetS = baseAvgS;
            let percentLabel = "Base (~63.2%)";
            let customP = parseFloat(customEtaInput);

            // Custom ETA logic
            if (!isNaN(customP) && customP > 0 && customP < 100) {
                let multiplier = -Math.log(1 - (customP / 100));
                finalTargetS = (odds * multiplier) / effRPS;
                percentLabel = customP + "%";
            }

            const t50 = (odds * 0.693147) / effRPS; 
            const t90 = (odds * 2.302585) / effRPS; 
            const t99 = (odds * 4.605170) / effRPS; 

            const resultsDiv = document.getElementById('results');
            resultsDiv.classList.remove('hidden');
            
            // Result show animation
            setTimeout(() => {
                resultsDiv.classList.remove('opacity-0', 'translate-y-4');
                resultsDiv.classList.add('opacity-100', 'translate-y-0');
            }, 10);

            document.getElementById('fullTime').innerHTML = formatTime(finalTargetS);
            document.getElementById('etaSubtext').innerText = `${percentLabel} chance to hit the item by this time`;
            
            const rollsRequired = finalTargetS * effRPS;

            document.getElementById('t50').innerHTML = formatTime(t50);
            document.getElementById('t90').innerHTML = formatTime(t90);
            document.getElementById('t99').innerHTML = formatTime(t99);
            document.getElementById('effSpeed').innerText = effRPS.toLocaleString(undefined, {maximumFractionDigits: 2});
            document.getElementById('totalRolls').innerText = rollsRequired >= 1e6 ? rollsRequired.toExponential(2) : rollsRequired.toLocaleString(undefined, {maximumFractionDigits: 0});
        }
    </script>
</body>
</html>
